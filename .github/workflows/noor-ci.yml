name: NOOR CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate NOOR app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check pack structure
        run: pnpm check:pack

      - name: Check content integrity
        run: pnpm check:content

      - name: Check release metadata
        run: pnpm check:release

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
