name: NOOR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  noor-checks:
    name: Validate NOOR app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate content source
        run: pnpm content:validate

      - name: Prepare CDN content
        run: pnpm content:prepare

      - name: Build CDN publish pack
        run: pnpm cdn:pack

      - name: Verify CDN publish pack
        run: pnpm cdn:verify

      - name: Smoke test CDN publish pack
        run: pnpm cdn:smoke

      - name: Generate CDN promotion handoff
        run: pnpm cdn:promote

      - name: Check CDN promotion handoff
        run: pnpm check:cdn-promotion

      - name: Audit source governance
        run: pnpm source:audit

      - name: Check source governance
        run: pnpm check:source-audit

      - name: Validate source intake
        run: pnpm source:intake

      - name: Check source intake
        run: pnpm check:source-intake

      - name: Validate Quran source gate
        run: pnpm quran:gate

      - name: Check Quran source gate
        run: pnpm check:quran-source-gate

      - name: Import Quran sample source
        run: pnpm quran:import

      - name: Check Quran importer
        run: pnpm check:quran-import

      - name: Import Tafseer sample source
        run: pnpm tafseer:import

      - name: Check Tafseer importer
        run: pnpm check:tafseer-import

      - name: Import Hadith sample source
        run: pnpm hadith:import

      - name: Check Hadith importer
        run: pnpm check:hadith-import

      - name: Generate scholarly review console
        run: pnpm review:console

      - name: Check scholarly review console
        run: pnpm check:review-console

      - name: Generate roadmap status
        run: pnpm roadmap:status

      - name: Check NOOR pack structure
        run: pnpm check:pack

      - name: Check content integrity
        run: pnpm check:content

      - name: Check release metadata
        run: pnpm check:release

      - name: Check runtime content source
        run: pnpm check:runtime

      - name: Check CDN publishing metadata
        run: pnpm check:cdn-publish

      - name: Check CDN smoke metadata
        run: pnpm check:cdn-smoke

      - name: Check roadmap status
        run: pnpm check:roadmap

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
