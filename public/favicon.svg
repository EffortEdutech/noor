<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#0d2820"/>
      <stop offset="50%"  stop-color="#091a14"/>
      <stop offset="100%" stop-color="#071014"/>
    </linearGradient>
    <radialGradient id="tint" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#2fbf9b" stop-opacity="0.11"/>
      <stop offset="50%"  stop-color="#2fbf9b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#2fbf9b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d8b75a" stop-opacity="0.30"/>
      <stop offset="50%"  stop-color="#d8b75a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b75a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%"   stop-color="#fbeea0"/>
      <stop offset="35%"  stop-color="#f5d97a"/>
      <stop offset="65%"  stop-color="#d8b75a"/>
      <stop offset="100%" stop-color="#b8902a"/>
    </linearGradient>
    <radialGradient id="hl" cx="47%" cy="46%" r="28%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="40%"  stop-color="#ffffd0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffd0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22.5" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22.5" fill="url(#tint)"/>
  <!-- Border -->
  <rect x="0.9" y="0.9" width="98.2" height="98.2" rx="21.6"
    fill="none" stroke="rgba(47,191,155,0.22)" stroke-width="1.8"/>
  <!-- Bloom -->
  <circle cx="50" cy="50" r="37.5" fill="url(#bloom)"/>
  <!-- 4-pointed sparkle  R=30, cp=30*0.08=2.4 -->
  <path d="M50,20 C52.4,47.6 52.4,47.6 80,50 C52.4,52.4 52.4,52.4 50,80 C47.6,52.4 47.6,52.4 20,50 C47.6,47.6 47.6,47.6 50,20 Z" fill="url(#star)"/>
  <!-- Centre highlight -->
  <circle cx="50" cy="50" r="8.4" fill="url(#hl)"/>
</svg>