<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#071014" />
    <title>NOOR Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #173137, #071014 55%);
        color: #f4efe2;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 560px);
        border: 1px solid rgba(216,183,90,.32);
        border-radius: 28px;
        padding: 28px;
        background: rgba(8, 22, 27, .88);
        box-shadow: 0 30px 100px rgba(0,0,0,.36);
      }
      .badge {
        display: inline-flex;
        border: 1px solid rgba(216,183,90,.42);
        border-radius: 999px;
        padding: 6px 10px;
        color: #d8b75a;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      h1 { margin: 16px 0 8px; font-size: clamp(30px, 7vw, 52px); line-height: 1; }
      p { color: #b9c1bb; line-height: 1.7; }
      a {
        display: inline-flex;
        margin-top: 14px;
        border-radius: 999px;
        background: #d8b75a;
        color: #071014;
        text-decoration: none;
        font-weight: 800;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">NOOR Offline</span>
      <h1>You are offline.</h1>
      <p>The NOOR app shell is available locally. Reconnect to refresh Quran, Tafseer, Hadith or CDN-backed content.</p>
      <a href="/today">Return to Today</a>
    </main>
  </body>
</html>
